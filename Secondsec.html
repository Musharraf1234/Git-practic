<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneering the Next Dimension Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & General Styles */
        :root {
            --bg-color: #0d001a; /* Deep dark purple/indigo */
            --text-color: #ffffff;
            --purple-accent: #9d00ff; /* Vivid purple for stats, accents */
            --body-text-color: #d1c8e1; /* Lighter body text */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .section-container {
            width: 100%;
            max-width: 1400px;
            padding: 80px 20px;
        }

        /* Header Row (Headline and Body Text) */
        .header-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .headline {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 2.8rem;
            line-height: 1.2;
            font-weight: 900;
        }

        .headline-purple {
            color: var(--purple-accent);
        }

        .body-text {
            color: var(--body-text-color);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Content Row (Features and Cards) */
        .content-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        /* Left Side: Features List */
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Sprite Icon Container */
        .icon-container {
            width: 100px;
            height: 100px;
            overflow: hidden;
            position: relative;
        }

        .icon-image {
            position: absolute;
            background-image: url('https://virtura.tokotema.xyz/wp-content/uploads/2025/12/3dicons-Open-source-3D-icon-library-Community.png');
            background-size: cover; /* Important to keep sprite scaling correct */
            width: 500px; /* Example: sprite is 500px wide */
            height: 500px; /* Example: sprite is 500px tall */
        }

        /* Gift Box */
        .icon-gift .icon-image {
            background-position: 0 0; /* (x, y) coordinates for gift box */
        }

        /* Heart Bubble */
        .icon-heart .icon-image {
            background-position: 0 -150px; /* Coordinate for heart bubble */
        }

        /* Book */
        .icon-book .icon-image {
            background-position: -200px -300px; /* Coordinate for book */
        }

        .feature-text {
            display: flex;
            flex-direction: column;
        }

        .stat {
            font-family: 'Orbitron', sans-serif;
            color: var(--purple-accent);
            font-size: 2.5rem;
            font-weight: 700;
        }

        .label {
            color: var(--body-text-color);
            font-size: 1rem;
        }

        /* Right Side: Cards Image */
        .cards-image-container {
            width: 100%;
            height: auto;
            display: flex;
            justify-content: flex-end;
            position: relative;
        }

        .cards-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            transform: translateY(20px); /* Small offset like in the image */
        }

        /* Responsive design */
        @media (max-width: 900px) {
            .header-row, .content-row {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .body-text {
                margin-top: 10px;
            }

            .cards-image-container {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="section-container">
        
        <div class="header-row">
            <h1 class="headline">
                PIONEERING THE<br>
                NEXT <span class="headline-purple">DIMENSION</span><br>
                OF EXPERIENCE
            </h1>
            <p class="body-text">
                Elementum augue ut sagittis nancy.<br>
                Posuere id velit integer proin aliquam<br>
                facilisi quis et cras aliqitising.
            </p>
        </div>

        <div class="content-row">
            
            <div class="features-list">
                
                <div class="feature-item">
                    <div class="icon-container icon-gift">
                        <div class="icon-image"></div>
                    </div>
                    <div class="feature-text">
                        <div class="stat" id="stat-sold">0</div>
                        <div class="label">Product Sold</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="icon-container icon-heart">
                        <div class="icon-image"></div>
                    </div>
                    <div class="feature-text">
                        <div class="stat" id="stat-review">0</div>
                        <div class="label">Positive Review</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="icon-container icon-book">
                        <div class="icon-image"></div>
                    </div>
                    <div class="feature-text">
                        <div class="stat" id="stat-library">0</div>
                        <div class="label">VR Content Library</div>
                    </div>
                </div>
            </div>

            <div class="cards-image-container">
                <img src="https://virtura.tokotema.xyz/wp-content/uploads/2025/12/Group-2.png" alt="VR Girl Cards" class="cards-image">
            </div>

        </div>
    </div>

    <script>
        // JS count-up animation for statistics
        function countUp(targetElement, targetNumber, duration) {
            let start = 0;
            let current = start;
            let increment = Math.ceil(targetNumber / (duration / 10)); // Increment per 10ms
            
            let timer = setInterval(function() {
                current += increment;
                if (current >= targetNumber) {
                    current = targetNumber;
                    clearInterval(timer);
                }
                targetElement.innerText = current + "K+";
            }, 10);
        }

        // Apply count-up for each statistic
        window.addEventListener('DOMContentLoaded', function() {
            countUp(document.getElementById('stat-sold'), 412, 1500);
            countUp(document.getElementById('stat-review'), 100, 1500);
            countUp(document.getElementById('stat-library'), 24, 1500);
        });
    </script>

</body>
</html>
